<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Musicoo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: #111;
            border-radius: 32px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px #2a2a2a inset;
            text-align: center;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            color: #222;
            text-shadow: 0 0 15px #444, 2px 2px 0 #333;
            letter-spacing: -5px;
            margin-bottom: 0.5rem;
        }

        .emoji-large {
            font-size: 4rem;
            margin: 0.5rem 0;
            filter: grayscale(30%);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }

        .message {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 1.8rem;
            margin: 2rem 0;
            border: 1px solid #2a2a2a;
        }

        .message p {
            color: #ccc;
            font-size: 1.2rem;
        }

        .message p:last-child {
            margin-bottom: 0;
        }

        .note {
            background: #000;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            border: 1px dashed #444;
            color: #aaa;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }

        .button {
            display: inline-block;
            background: #1e1e1e;
            border: 1px solid #444;
            color: #ddd;
            text-decoration: none;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .button:hover {
            background: #2a2a2a;
            border-color: #666;
            color: #fff;
            transform: translateY(-2px);
        }

        .button-primary {
            background: #000;
            border: 1px solid #666;
            color: #fff;
        }

        .button-primary:hover {
            background: #1a1a1a;
            border-color: #888;
        }

        .footer {
            margin-top: 2rem;
            color: #777;
            font-size: 0.85rem;
        }

        .footer a {
            color: #aaa;
            text-decoration: none;
            border-bottom: 1px dotted #444;
        }

        .footer a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="emoji-large">😵‍💫</div>
        <h1>Page introuvable</h1>

        <div class="message">
            <p>On dirait que vous avez suivi un mauvais rythme…<br>Cette page n'existe pas (ou plus).</p>
        </div>

        <div class="note">
            Comme un salon vocal vide, cette page ne mène nulle part.
        </div>

        <div class="buttons">
            <a href="index.html" class="button button-primary">Accueil</a>
            <a href="legal.html" class="button">Conditions</a>
            <a href="legal.html" class="button">Confidentialité</a>
        </div>

        <div class="footer">
            <a href="https://discord.maxlware/com" target="_blank">💬 Rejoindre le support</a> · 
            <a href="index.html">Retour au site</a>
        </div>
    </div>
</body>
</html>
